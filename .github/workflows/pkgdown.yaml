# Build and deploy pkgdown site to GitHub Pages
# Runs on push to main, PRs (build only), releases, and manual dispatch.
# Reference: https://github.com/r-lib/actions/tree/v2/examples#pkgdown
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

concurrency:
  # PRs get their own group so each PR build is independent.
  # All non-PR runs share one group so rapid pushes cancel the previous run.
  group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
  cancel-in-progress: true

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # Set CENSUS_API_KEY if you have Census ACS vignettes that execute.
      # CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libgit2-dev libgdal-dev libgeos-dev libproj-dev \
            libudunits2-dev libfftw3-dev libtiff5-dev \
            libjpeg-dev libpng-dev qpdf

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website
          cache: true

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Add .nojekyll to prevent Jekyll processing
        run: touch docs/.nojekyll

      - name: Deploy to GitHub Pages
        # Only deploy on pushes to main and releases — not on PRs.
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.6.8
        with:
          branch: gh-pages
          folder: docs
          clean: true
