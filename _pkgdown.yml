url: https://mufflyt.github.io/mysterycall/
destination: docs

template:
  bootstrap: 5
  params:
    search: true
  opengraph:
    image:
      src: https://github.com/mufflyt/mysterycall/assets/44621942/3c4faeb4-7fe5-42e8-b2bf-7832588c6f57
      alt: "mysterycall hex logo"
    twitter:
      creator: "@mufflyt"
      card: summary_large_image

home:
  strip_header: true
  links:
    - text: Browse source code
      href: https://github.com/mufflyt/mysterycall
    - text: Report a bug
      href: https://github.com/mufflyt/mysterycall/issues

navbar:
  structure:
    left:
      - home
      - get-started
      - reference
      - articles
      - datasets
      - news
    right:
      - search
      - github
  components:
    get-started:
      text: Get Started
      href: articles/my-vignette.html
    datasets:
      text: Datasets
      href: reference/index.html#data-and-datasets

footer:
  structure:
    left: developed_by
    right: [built_with, repo_links]
  components:
    repo_links: |
      <a href="https://github.com/mufflyt/mysterycall/issues">Report a bug</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/mufflyt/mysterycall/blob/main/NEWS.md">Changelog</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/mufflyt/mysterycall/blob/main/LICENSE">MIT License</a>

